<svg width="760" height="160" viewBox="0 0 760 160" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Simple Irrigation</title>
  <desc id="desc">Clean wordmark logo for Simple Irrigation with a subtle water drop and irrigation line integrated into the text.</desc>
  <defs>
    <linearGradient id="accent" x1="318" y1="43" x2="498" y2="123" gradientUnits="userSpaceOnUse">
      <stop stop-color="#38BDF8"/>
      <stop offset="1" stop-color="#22C55E"/>
    </linearGradient>
    <linearGradient id="drop" x1="397" y1="17" x2="429" y2="62" gradientUnits="userSpaceOnUse">
      <stop stop-color="#67E8F9"/>
      <stop offset="1" stop-color="#3B82F6"/>
    </linearGradient>
    <style>
      .text-main { fill: #111827; }
      .text-accent { fill: #0EA5E9; }
      @media (prefers-color-scheme: dark) {
        .text-main { fill: #F8FAFC; }
        .text-accent { fill: #7DD3FC; }
      }
    </style>
  </defs>

  <text x="34" y="99" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="72" font-weight="760" letter-spacing="-2.6" class="text-main">Simple</text>

  <!-- Integrated irrigation line: starts as the dot of the first i, then becomes a hose-like underline -->
  <path d="M389 104C430 132 492 132 533 104" stroke="url(#accent)" stroke-width="9" stroke-linecap="round"/>
  <path d="M546 104C560 96 577 96 590 104" stroke="url(#accent)" stroke-width="9" stroke-linecap="round"/>

  <!-- Water drop as the dot above the first i in Irrigation -->
  <path d="M425 45C425 56.046 416.046 65 405 65C393.954 65 385 56.046 385 45C385 31 405 8 405 8C405 8 425 31 425 45Z" fill="url(#drop)"/>
  <circle cx="399" cy="40" r="4" fill="white" fill-opacity="0.65"/>

  <text x="353" y="99" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="72" font-weight="760" letter-spacing="-2.6" class="text-accent">Irrigation</text>
</svg>
